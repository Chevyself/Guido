## Commands

# Eval command
eval.desc=Execute javascript code
eval.code=Code
eval.code.desc=The javascript code to execute. \n When using the return statement I will send you a message with the returned object. For example: \n ```return 4 + 4``` I will print: `Script has been executed 2` \n I will provide you with objects such as: \n "_message_" The message that was used to execute this command \n "_channel_" The channel where this command was executed \n "_args_" An array of **string** which are the representation of this command execution \n "_api_" My connection with the **Discord API** \n > In case that the command is executed inside a guild (Discord server) I will also provide the next objects: \n "_guild_" which is the guild where the command was executed \n "_member_" You! This is the user who executes the command

