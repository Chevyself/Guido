teams.not-event=There's not an event amount of players in the voice chat!
teams.not-connected=You are not connected to a voice chat

# Leaders commands
leaders.desc=Get a number of leaders in the voice channel
leaders.number=Number
leaders.number.desc=The number of leaders to get
leaders.result=The leaders are: %leaders%
leaders.not-enough=There's not enough players to get %number% of leaders
leaders.not-connected=You are not connected to a voice chat

# Token commands
tokens.desc=See your generated or someone else's tokens
tokens.empty=You don't seem to have tokens
tokens.token= \n %token% level: %level%

# Token generation commands
token.gen.desc=Generate a new token!
token.gen.perm=Permission
token.gen.perm.desc=The level of permission for the token: `read` `read_write`

# Help command
help.desc=Get help on how to use certain commands
help.cmd=Command
help.cmd.desc=The command to get help from
help.not-allowed=You are not allowed to see help for the command %name%
help.unknown-cmd=The command %name% does not allowed

help.cmd.title=Seeing information for %name% \n Description: `%desc%` \n Aliases: `%aliases%` \n Permission: `%perm%`
help.cmd.empty-node=No permission
help.cmd.arg.required= <%name%>
help.cmd.arg.optional= (%name%)
help.cmd.usage=\n Usage: `.%name% %arguments%`

help.parent-cmd.child= \n - %name% `%desc%`
help.parent.children=\n Children: %children%

help.cmds.title=You're getting help for the commands. To see the information for an specific command use: `.help <command name>`
help.cmds=\n - %name% `%desc%`

