help.unknown-cmd=The command `%name%` does not exist

help.cmd.title=Seeing information for ***%name%*** \n Description and Help: \n `%desc%` \n Aliases: `%aliases%` \n Permission: `%perm%`
help.cmd.empty-node=No permission
help.cmd.arg.required= <%name%>
help.cmd.arg.optional= (%name%)
help.cmd.usage=\n Usage: \n > <> Means that the argument is required \n > () Means that the argument is optional > You don't have to use `()` or `<>` in the command execution \n `.%name% %arguments%`

help.parent-cmd.child= \n - %name% `%desc%`
help.parent.children=\n Children: \n This commands are executed as follows: `.<parent> <child> arguments...` \n %children%

help.cmds.title=You're getting help for the commands. \n If you require further help please contact the support matchTeam \n To see the information for an specific command use: `.help <command>`
help.cmds=\n - .%name% `%desc%`

